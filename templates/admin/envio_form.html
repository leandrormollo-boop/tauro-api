{% extends "admin/base_admin.html" %}
{% block title %}Cargar factura{% endblock %}

{% block content %}
<div class="page-title">
  <div class="eyebrow">Cuenta corriente</div>
  <h1>Cargar factura / envío</h1>
</div>

<div class="card" style="max-width:560px;">
  <form method="POST" action="/admin/envios/nuevo">

    <div class="form-group">
      <label>Cliente *</label>
      <select name="cliente_id" required>
        <option value="">— Seleccioná —</option>
        {% for c in clientes %}
        <option value="{{ c.cliente_id }}" {% if c.cliente_id == preselect_cliente %}selected{% endif %}>
          {{ c.cliente_id }} — {{ c.nombre or c.email }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label>Fecha *</label>
        <input type="date" name="fecha" required value="{{ today }}">
      </div>
      <div class="form-group">
        <label>Nro. Factura</label>
        <input type="text" name="nro_fc" placeholder="0106-00001234">
      </div>
    </div>

    <div class="form-group">
      <label>Monto ARS *</label>
      <input type="number" name="monto_ars" required min="0" step="1" placeholder="150000">
    </div>

    <div class="form-group">
      <label>Descripción</label>
      <input type="text" name="descripcion" placeholder="Envío FEDEX a USA · 3 piezas">
    </div>

    <div class="form-group">
      <label>Tracking</label>
      <input type="text" name="tracking" placeholder="7489270349280">
    </div>

    <div class="form-group">
      <label>Estado</label>
      <select name="estado">
        <option value="ACTIVO">Activo</option>
        <option value="CANCELADO">Cancelado</option>
        <option value="NC">Nota de crédito (NC)</option>
      </select>
    </div>

    <div style="display:flex;gap:12px;margin-top:8px;">
      <button type="submit" class="btn btn-primary">Guardar factura</button>
      <a href="/admin/home" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
