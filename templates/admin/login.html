<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login · Tauro</title>
  <link rel="stylesheet" href="/static/css/tauro.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;">
  <div class="login-card fade-up">
    <h1>Panel Admin</h1>
    <p class="sub">Acceso restringido a Tauro Solutions.</p>

    {% if error %}
      <div class="msg error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autofocus placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Entrar</button>
    </form>
  </div>
</div>
</body>
</html>
