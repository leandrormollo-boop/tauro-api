{% extends "admin/base_admin.html" %}
{% block title %}Registrar pago{% endblock %}

{% block content %}
<div class="page-title">
  <div class="eyebrow">Cuenta corriente</div>
  <h1>Registrar pago</h1>
</div>

<div class="card" style="max-width:480px;">
  <form method="POST" action="/admin/pagos/nuevo">

    <div class="form-group">
      <label>Cliente *</label>
      <select name="cliente_id" required>
        <option value="">— Seleccioná —</option>
        {% for c in clientes %}
        <option value="{{ c.cliente_id }}" {% if c.cliente_id == preselect_cliente %}selected{% endif %}>
          {{ c.cliente_id }} — {{ c.nombre or c.email }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label>Fecha *</label>
        <input type="date" name="fecha" required value="{{ today }}">
      </div>
      <div class="form-group">
        <label>Monto ARS *</label>
        <input type="number" name="monto_ars" required min="0" step="1" placeholder="80000">
      </div>
    </div>

    <div class="form-group">
      <label>Método *</label>
      <select name="metodo" required>
        <option value="transferencia">Transferencia bancaria</option>
        <option value="efectivo">Efectivo</option>
        <option value="cheque">Cheque</option>
        <option value="otro">Otro</option>
      </select>
    </div>

    <div class="form-group">
      <label>Referencia / CBU / Comprobante</label>
      <input type="text" name="referencia" placeholder="CBU 0110599220059901234567">
    </div>

    <div class="form-group">
      <label>Nota</label>
      <input type="text" name="nota" placeholder="Pago parcial — cuota 1/3">
    </div>

    <div style="display:flex;gap:12px;margin-top:8px;">
      <button type="submit" class="btn btn-primary">Guardar pago</button>
      <a href="/admin/home" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
